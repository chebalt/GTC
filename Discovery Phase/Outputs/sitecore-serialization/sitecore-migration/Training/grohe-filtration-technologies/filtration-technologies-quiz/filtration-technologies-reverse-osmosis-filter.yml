    - ID: "7c308f85-77e5-bd60-a45b-a3cf3f2e8e70"
      Hint: BlankText
      Value: The Reverse Osmosis Filter is especially useful for areas with unhealthy substances in the tap water, such as metals, plastics, {{ bacteria | chlorine | lime }}, viruses or hormones. The high performance particle filtration should only be used with a {{ water hardness | pH-level | chlorine content }} of max. 20° dKH. In cases with higher water hardness the water needs to be {{ softened | purified | mineralised }} before. Otherwise the reverse osmosis {{ membrane | filter | ions }} gets blocked too fast.
