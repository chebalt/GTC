      Value: ISH 2025 - Which statements are true about the GROHE Heat Recovery Shower Frame?
    - ID: "fc50f05f-0f7b-9fb9-d702-9f9c4e1475fc"
      Hint: QuestionText
      Value: |
        <p>Which statements are true about the GROHE Heat Recovery Shower Frame?</p>
    - ID: "7cc83bac-8fbc-fbc5-e03c-707cd1544063"
      Hint: PositiveFeedbackText
      Value: |
        <p>The GROHE Heat Recovery Shower Frame is indeed based on the GROHE Rapido Shower Frame. Depending on the variant, it includes one or two heat exchanger copper pipes where the recirculated grey water heats up the cold water. The Thermostat now only needs to add less than 60°C hot water for a 38°C warm shower which contributes to sustainability and a reduction of energy costs.</p>
