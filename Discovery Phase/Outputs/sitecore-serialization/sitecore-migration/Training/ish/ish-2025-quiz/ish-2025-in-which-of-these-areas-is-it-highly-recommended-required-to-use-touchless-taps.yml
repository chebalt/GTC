      Value: ISH 2025 - In which of these areas is it highly recommended/required to use touchless taps?
    - ID: "fc50f05f-0f7b-9fb9-d702-9f9c4e1475fc"
      Hint: QuestionText
      Value: |
        <p>In which of these areas is it highly recommended/required to use touchless taps?</p>
    - ID: "7cc83bac-8fbc-fbc5-e03c-707cd1544063"
      Hint: PositiveFeedbackText
      Value: |
        <p>In sensitive areas such as hospitals, and food processing factories it is required to use touchless taps. In environments where many people gather for example in schools, shopping malls or stadiums the use of these taps is highly recommended to avoid the spreading of germs.</p>
