        <p>Which are the correct statements about the automatic flushing of Sensia Pro?</p>
    - ID: "7cc83bac-8fbc-fbc5-e03c-707cd1544063"
      Hint: PositiveFeedbackText
      Value: |
        <p>Very good! The automatic flushing feature is an option and the connection set 46944001 must be ordered separately. The flush volume can vary between 3l and 5l depending on the length of the stay.</p>
