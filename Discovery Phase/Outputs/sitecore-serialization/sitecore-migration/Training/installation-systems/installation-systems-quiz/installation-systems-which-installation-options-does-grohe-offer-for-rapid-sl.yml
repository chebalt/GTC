      Value: Installation systems - Which installation options does GROHE offer for Rapid SL?
    - ID: "fc50f05f-0f7b-9fb9-d702-9f9c4e1475fc"
      Hint: QuestionText
      Value: |
        <p>Which installation options does GROHE offer for Rapid SL?</p>
    - ID: "bbae6a74-13e2-04f3-6170-4e0705144018"
      Hint: QuestionInstruction
      Value: |
        <p>Please select the right answers and confirm by clicking OK.</p>
    - ID: "7cc83bac-8fbc-fbc5-e03c-707cd1544063"
      Hint: PositiveFeedbackText
      Value: |
        <p>Yes, that is correct. There are 4 installation options but unlike for Uniset walling-in in a brick wall is not an option. Rapid SL can be installed in studded walls, in a row using a rail, freestanding or in front of a solid wall.</p>
    - ID: "19709f27-d70e-9bb4-3c15-3afba54ebde2"
      Hint: NegativeFeedbackText
      Value: |
        <p>Sorry, this is not correct. Rapid SL must never be walled-in e.g. with bricks. Walling-in in a brick wall is just an option for Uniset. Rapid SL can be installed in studded walls, in a row using a rail, freestanding or in front of a solid wall.</p>
