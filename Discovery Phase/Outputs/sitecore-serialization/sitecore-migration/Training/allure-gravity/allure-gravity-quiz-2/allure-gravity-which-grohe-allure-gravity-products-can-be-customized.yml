        <p>Please select the right answers and confirm by clicking OK.</p>
    - ID: "7cc83bac-8fbc-fbc5-e03c-707cd1544063"
      Hint: PositiveFeedbackText
      Value: |
        <p>Correct! GROHE Allure Gravity basin, bath &amp; shower mixers can be customized by changing the cover plates. But also the accessories like robe hook, towel rail, toilet brush set and toilet paper holder can be customized with the cover plates.</p>
    - ID: "19709f27-d70e-9bb4-3c15-3afba54ebde2"
      Hint: NegativeFeedbackText
      Value: |
        <p>Sorry, this is not correct. GROHE Allure Gravity basin, bath &amp; shower mixers can be customized by changing the cover plates. But also the accessories like robe hook, towel rail, toilet brush set and toilet paper holder can be customized with the cover plates. Only the grab rails do not have a cover plate. Flush plates are not in the GROHE Allure Gravity product range at all.</p>
