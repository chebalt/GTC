        <p>What happens inside the system during the recirculation mode?</p>
    - ID: "7cc83bac-8fbc-fbc5-e03c-707cd1544063"
      Hint: PositiveFeedbackText
      Value: |
        <p>The used water is filtered and cleaned by a UV light. It is heated up between 1°C and 4°C and it flows in different pipes as there should not be any contact with fresh water.</p>
